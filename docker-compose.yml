services:
  redis:
    image: redis:7-alpine
    container_name: bengoredis
    restart: no
    ports:
      - "63795:6379"
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: bengobot
    pull_policy: build
    restart: no
    ports:
      - "8083:8083"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src   # for development hot-reload (optional)

