<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengobot Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.15);
            --green: #3fb950;
            --red: #f85149;
            --border: #30363d;
            --radius: 12px;
            --header-bg: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        body.light-theme {
            --bg: #ffffff;
            --card-bg: #f6f8fa;
            --text: #1f2328;
            --text-secondary: #656d76;
            --accent: #0969da;
            --accent-glow: rgba(9, 105, 218, 0.1);
            --green: #1a7f37;
            --red: #cf222e;
            --border: #d0d7de;
            --header-bg: #ffffff;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a371f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .disconnected { background: var(--red); box-shadow: 0 0 8px var(--red); }

        /* Main content */
        .container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 20px;
            flex: 1;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            overflow: hidden; /* prevent child overflow */
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border-color: var(--accent);
        }

        .card h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: var(--accent);
            border-radius: 2px;
        }

        .card-full {
            grid-column: 1 / -1;
        }

        /* Table wrapper for horizontal scroll if needed */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            max-width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 600px; /* ensures tables don't squeeze too much */
        }

        th {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 2px solid var(--border);
            color: var(--text-secondary);
            font-weight: 600;
            white-space: nowrap;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
            word-break: break-word;
            overflow-wrap: break-word;
        }

        tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        tfoot td {
            font-weight: 700;
            border-top: 2px solid var(--border);
        }

        .green { color: var(--green); }
        .red { color: var(--red); }

        .clickable-coin {
            cursor: pointer;
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .clickable-coin:hover {
            opacity: 0.8;
        }

        #coins, #balances, #profit {
            font-size: 0.95rem;
            word-break: break-word;
        }

        #profit span {
            font-weight: 600;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
            }
            .logo {
                font-size: 1.4rem;
            }
            .container {
                padding: 16px 12px;
            }
            .dashboard {
                grid-template-columns: 1fr;
            }
            .card {
                padding: 16px;
            }
            table {
                font-size: 0.8rem;
            }
            th, td {
                padding: 8px 6px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <span class="logo">Bengobot</span>
        </div>
        <div class="status-badge">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Connecting...</span>
        </div>
        <button id="theme-toggle" title="Toggle theme" style="background: none; border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 1rem;">
            🌙
        </button>
    </header>

    <div class="container">
        <div class="dashboard">
            <div class="card">
                <h2>Current Coins</h2>
                <div id="coins">-</div>
            </div>

            <div class="card">
                <h2>Balances</h2>
                <div id="balances">-</div>
            </div>

            <div class="card card-full">
                <h2>Positions</h2>
                <div class="table-wrapper">
                    <table id="positions-table">
                        <thead><tr><th>Symbol</th><th>Amount</th><th>Entry Price</th><th>Stop Loss</th><th>Take Profit</th><th>Trailing</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="card card-full">
                <h2>Recent Trades</h2>
                <div class="table-wrapper">
                    <table id="trades-table">
                        <thead><tr><th>Time</th><th>Side</th><th>Symbol</th><th>Amount</th><th>Price</th><th>Fee</th><th>P&L</th><th>Profit %</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h2>Profit Summary</h2>
                <div id="profit">-</div>
            </div>

            <div class="card card-full">
                <h2>Performance</h2>
                <div class="table-wrapper">
                    <table id="performance-table">
                        <thead><tr><th>Symbol</th><th>Timeframe</th><th>Trades</th><th>Profit</th><th>Profit %</th><th>Win Rate</th></tr></thead>
                        <tbody></tbody>
                        <tfoot></tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const wsUrl = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws`;
        let ws;
        function connect() {
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                document.getElementById('status-dot').className = 'status-dot connected';
                document.getElementById('status-text').textContent = 'Connected';
            };
            ws.onclose = () => {
                document.getElementById('status-dot').className = 'status-dot disconnected';
                document.getElementById('status-text').textContent = 'Disconnected – retrying in 3s';
                setTimeout(connect, 3000);
            };
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                updateUI(data);
            };
        }

        function updateUI(data) {
            // Coins
            const coinsDiv = document.getElementById('coins');
            coinsDiv.innerHTML = '';
            if (data.current_coins && data.current_coins.length > 0) {
                data.current_coins.forEach(coin => {
                    const span = document.createElement('span');
                    span.textContent = coin;
                    span.className = 'clickable-coin';
                    span.style.marginRight = '8px';
                    span.onclick = () => openChart(coin);
                    coinsDiv.appendChild(span);
                });
            } else {
                coinsDiv.textContent = 'None';
            }

            // Positions
            const posBody = document.querySelector('#positions-table tbody');
            posBody.innerHTML = '';
            if (data.positions) {
                for (const [sym, pos] of Object.entries(data.positions)) {
                    const row = posBody.insertRow();
                    const symCell = row.insertCell();
                    symCell.textContent = sym;
                    symCell.className = 'clickable-coin';
                    symCell.onclick = () => openChart(sym);
                    row.insertCell().textContent = pos.amount?.toFixed(6) || '';
                    row.insertCell().textContent = pos.price?.toFixed(4) || '';
                    row.insertCell().textContent = pos.stop_loss?.toFixed(4) || '';
                    row.insertCell().textContent = pos.take_profit?.toFixed(4) || '';
                    row.insertCell().textContent = pos.trailing_stop ? 'Yes' : 'No';
                }
            }

            // Balances
            const balDiv = document.getElementById('balances');
            if (data.balances) {
                balDiv.innerHTML = Object.entries(data.balances)
                    .filter(([_, v]) => v > 0)
                    .map(([k, v]) => `${k}: ${v.toFixed(6)}`)
                    .join('<br>') || 'None';
            }

            // Trades
            const tradesBody = document.querySelector('#trades-table tbody');
            tradesBody.innerHTML = '';
            if (data.trades) {
                data.trades.slice().reverse().forEach(t => {
                    const row = tradesBody.insertRow();
                    row.insertCell().textContent = new Date(t.timestamp).toLocaleTimeString();
                    row.insertCell().textContent = t.side?.toUpperCase();
                    row.insertCell().textContent = t.symbol;
                    row.insertCell().textContent = t.amount?.toFixed(6);
                    row.insertCell().textContent = t.price?.toFixed(4);
                    // Fee
                    const fee = t.fee;
                    const feeStr = fee ? `${fee.cost?.toFixed(6)} ${fee.currency}` : '-';
                    row.insertCell().textContent = feeStr;
                    // P&L (only for sells)
                    const pnlCell = row.insertCell();
                    if (t.side === 'sell' && t.realized_pnl !== undefined) {
                        pnlCell.textContent = t.realized_pnl.toFixed(4);
                        pnlCell.className = t.realized_pnl >= 0 ? 'green' : 'red';
                    } else {
                        pnlCell.textContent = '-';
                    }
                });
            }

            // Profit
            const profitDiv = document.getElementById('profit');
            if (data.profit) {
                const p = data.profit;
                profitDiv.innerHTML = `
                    Initial: ${p.initial_balance?.toFixed(2)}<br>
                    Current: ${p.current_balance?.toFixed(2)}<br>
                    Open Value: ${p.open_value?.toFixed(2)}<br>
                    Fees Paid: ${p.total_fees?.toFixed(2)}<br>
                    P&L: <span class="${p.total_pnl >= 0 ? 'green' : 'red'}">${p.total_pnl?.toFixed(2)} (${p.pnl_percent?.toFixed(2)}%)</span>
                `;
            }

            // Performance
            const perfBody = document.querySelector('#performance-table tbody');
            const perfFoot = document.querySelector('#performance-table tfoot');
            perfBody.innerHTML = '';
            perfFoot.innerHTML = '';
            if (data.performance) {
                const perf = data.performance;
                if (perf.rows && perf.rows.length > 0) {
                    perf.rows.forEach(r => {
                        const row = perfBody.insertRow();
                        row.insertCell().textContent = r.symbol;
                        row.insertCell().textContent = r.timeframe || '—';
                        row.insertCell().textContent = r.trade_count;
                        const profitCell = row.insertCell();
                        profitCell.textContent = r.profit?.toFixed(4);
                        profitCell.className = r.profit >= 0 ? 'green' : 'red';
                        const profitPctCell = row.insertCell();
                        profitPctCell.textContent = r.profit_pct?.toFixed(2) + '%';
                        profitPctCell.className = r.profit_pct >= 0 ? 'green' : 'red';
                        row.insertCell().textContent = r.win_rate?.toFixed(1) + '%';
                    });
                } else {
                    const row = perfBody.insertRow();
                    const cell = row.insertCell();
                    cell.colSpan = 6;
                    cell.textContent = 'No closed sell trades yet';
                    cell.style.textAlign = 'center';
                    cell.style.color = 'var(--text-secondary)';
                }
                if (perf.total) {
                    const t = perf.total;
                    const footRow = perfFoot.insertRow();
                    footRow.insertCell().textContent = t.symbol;
                    footRow.insertCell().textContent = t.timeframe || '—';
                    footRow.insertCell().textContent = t.trade_count;
                    const totalProfitCell = footRow.insertCell();
                    totalProfitCell.textContent = t.profit?.toFixed(4);
                    totalProfitCell.className = t.profit >= 0 ? 'green' : 'red';
                    const totalProfitPctCell = footRow.insertCell();
                    totalProfitPctCell.textContent = t.profit_pct?.toFixed(2) + '%';
                    totalProfitPctCell.className = t.profit_pct >= 0 ? 'green' : 'red';
                    footRow.insertCell().textContent = t.win_rate?.toFixed(1) + '%';
                    footRow.style.fontWeight = 'bold';
                    footRow.style.borderTop = '2px solid var(--border)';
                }
            }
        }

        // Theme toggle
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        function setTheme(isLight) {
            if (isLight) {
                body.classList.add('light-theme');
                themeToggle.textContent = '☀️';
            } else {
                body.classList.remove('light-theme');
                themeToggle.textContent = '🌙';
            }
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        // Load saved theme (default dark)
        const savedTheme = localStorage.getItem('theme');
        setTheme(savedTheme === 'light');

        themeToggle.addEventListener('click', () => {
            const isLight = body.classList.contains('light-theme');
            setTheme(!isLight);
        });

        let chartInstance = null;
        const modal = document.getElementById('chart-modal');
        const closeBtn = document.getElementById('close-modal');
        const timeframeSelect = document.getElementById('timeframe-select');
        const chartTitle = document.getElementById('chart-title');
        let currentSymbol = null;

        closeBtn.onclick = () => {
            modal.style.display = 'none';
            if (chartInstance) {
                chartInstance.destroy();
                chartInstance = null;
            }
        };

        timeframeSelect.onchange = () => {
            if (currentSymbol) fetchAndRenderChart(currentSymbol, timeframeSelect.value);
        };

        async function openChart(symbol) {
            currentSymbol = symbol;
            chartTitle.textContent = symbol;
            modal.style.display = 'flex';
            await fetchAndRenderChart(symbol, timeframeSelect.value);
        }

        async function fetchAndRenderChart(symbol, timeframe) {
            try {
                const resp = await fetch(`/api/ohlcv/${encodeURIComponent(symbol)}?timeframe=${timeframe}&limit=48`);
                if (!resp.ok) throw new Error('Failed to fetch OHLCV data');
                const json = await resp.json();
                const data = json.data;
                const labels = data.map(d => new Date(d.timestamp).toLocaleString());
                const closes = data.map(d => d.close);

                const ctx = document.getElementById('ohlcv-chart').getContext('2d');
                if (chartInstance) chartInstance.destroy();

                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: symbol + ' Close',
                            data: closes,
                            borderColor: '#58a6ff',
                            backgroundColor: 'rgba(88,166,255,0.1)',
                            fill: true,
                            tension: 0.2,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: { ticks: { color: '#8b949e' } },
                            y: { ticks: { color: '#8b949e' } }
                        }
                    }
                });
            } catch (err) {
                console.error(err);
                alert('Could not load chart data.');
            }
        }

        connect();
    </script>
    <!-- Chart Modal -->
    <div id="chart-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:90%; max-width:900px; max-height:90vh; overflow-y:auto; position:relative;">
            <button id="close-modal" style="position:absolute; top:12px; right:16px; background:none; border:none; color:var(--text); font-size:1.5rem; cursor:pointer;">&times;</button>
            <h2 id="chart-title" style="margin-bottom:16px; color:var(--accent);"></h2>
            <div style="margin-bottom:12px;">
                <label for="timeframe-select" style="margin-right:8px;">Timeframe:</label>
                <select id="timeframe-select" style="background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:4px 8px;">
                    <option value="5m">5m</option>
                    <option value="15m">15m</option>
                    <option value="1h" selected>1h</option>
                    <option value="4h">4h</option>
                    <option value="1d">1d</option>
                </select>
            </div>
            <canvas id="ohlcv-chart" width="800" height="400"></canvas>
        </div>
    </div>
</body>
</html>
